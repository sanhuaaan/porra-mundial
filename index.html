<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porra Mundial 2026</title>
  <style>
    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --ink: #1c1a17;
      --muted: #8a8377;
      --line: #ece7df;
      --accent: #b4451f;
      --num: #2b2723;
    }
    * { box-sizing: border-box; }
    /* Reserva siempre el hueco de la barra de scroll: así, al desplegar un
       detalle, la barra al aparecer no estrecha el viewport ni mueve la página. */
    html { scrollbar-gutter: stable; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
    header { margin-bottom: 32px; }
    h1 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 14px; }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 40px 0 14px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    .ranking { background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .ranking .caret-col { width: 28px; }
    .ranking .pos { width: 36px; }

    .ranking tr.row { cursor: pointer; border-top: 1px solid var(--line); transition: background 0.12s; }
    .ranking tr.row:hover { background: #f7f3ec; }
    .ranking tr.row > td { padding-top: 13px; padding-bottom: 13px; }
    .ranking tr.row .caret { color: var(--muted); transition: transform 0.15s; transform-origin: center; }
    .ranking tr.row.open { background: #f7f3ec; }
    .ranking tr.row.open .caret { transform: rotate(90deg); color: var(--accent); }
    .ranking tr.row .pos { color: var(--muted); }
    .ranking tr.row .name { font-weight: 600; }
    .ranking tbody tr.row:first-child .pos { color: var(--accent); }
    .pts { color: var(--num); font-weight: 600; }

    /* Fila de detalle expandible dentro de cada participante.
       La altura se anima con el truco grid-template-rows 0fr -> 1fr. */
    .ranking tr.detail > td { padding: 0; background: #fbf8f3; }
    .ranking tr.detail > td:first-child { background: var(--card); }
    .accordion { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.28s ease; }
    .ranking tr.detail.open .accordion { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; opacity: 0; transition: opacity 0.28s ease; }
    .ranking tr.detail.open .accordion-inner { opacity: 1; }
    /* Solo scroll horizontal. overflow-y explícito a hidden: si se deja en
       'visible', el navegador lo fuerza a 'auto' (porque overflow-x es auto) y
       aparece una barra vertical fantasma que parpadea al animar el desglose. */
    .teams-scroll { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; }
    .teams { background: transparent; }
    .teams th, .teams td { padding: 7px 12px; font-size: 13.5px; border: none; white-space: nowrap; }
    .teams thead th { color: var(--muted); font-weight: 600; padding-top: 10px; }
    .teams tbody tr { border-top: 1px solid var(--line); }
    .teams td:first-child { color: var(--ink); }
    /* Primera columna (selección) fija al desplazar horizontalmente en móvil */
    .teams th:first-child, .teams td:first-child {
      position: sticky; left: 0; z-index: 1;
      background: #fbf8f3; box-shadow: 1px 0 0 var(--line);
    }
    .teams .num { color: var(--muted); }
    .teams .num.pts { color: var(--num); }
    .flag { width: 20px; height: 15px; object-fit: cover; border-radius: 2px; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08); vertical-align: -2px; margin-right: 8px; }

    /* Segundo nivel: desglose de puntos de cada selección, expandible al pulsar. */
    .teams tr.team-row.has-detail { cursor: pointer; }
    .teams tr.team-row.has-detail:hover td:first-child { color: var(--accent); }
    .t-caret, .t-caret-empty { display: inline-block; width: 12px; color: var(--muted); transition: transform 0.15s; }
    .teams tr.team-row.open .t-caret { transform: rotate(90deg); color: var(--accent); }
    /* La fila de detalle no debe quedar fija ni con el fondo de la 1ª columna. */
    .teams tr.team-detail > td { position: static; left: auto; box-shadow: none; padding: 0; background: #f3ede4; white-space: normal; }
    .t-accordion { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.24s ease; }
    .teams tr.team-detail.open .t-accordion { grid-template-rows: 1fr; }
    .t-accordion-inner { overflow: hidden; }
    .bd { padding: 2px 12px 10px 26px; font-size: 12.5px; }
    .bd-sec { text-transform: uppercase; letter-spacing: 0.05em; font-size: 10.5px; color: var(--muted); font-weight: 700; margin: 9px 0 3px; }
    /* Los puntos van a la derecha, alineados bajo la columna TOTAL. */
    .bd-line { display: flex; justify-content: space-between; gap: 14px; padding: 3px 0; align-items: baseline; border-radius: 6px; transition: background 0.12s; }
    .bd-text { color: var(--ink); }
    .bd-note { color: var(--muted); margin-left: 7px; }
    /* Distintivo de partido en juego (liguilla en curso): punto rojo que late + «en vivo». */
    .bd-live { color: #d1242f; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 7px; white-space: nowrap; }
    .bd-live::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #d1242f; margin-right: 4px; vertical-align: 1px; animation: live-pulse 1.4s ease-in-out infinite; }
    @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .bd-pts { font-variant-numeric: tabular-nums; color: var(--num); font-weight: 600; white-space: nowrap; }
    /* Resaltado de toda la línea al pasar el ratón (solo en dispositivos con hover
       real): ayuda a seguir el "carril" entre el resultado y sus puntos. */
    @media (hover: hover) { .bd-line:hover { background: #ece3d5; } }

    .notice { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 24px; color: var(--muted); }
    .warning { background: #fdf3e7; border: 1px solid #e8c9a0; color: #8a5a1f; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; line-height: 1.45; }
    code { background: #f1ece4; padding: 1px 6px; border-radius: 5px; font-size: 0.9em; }

    /* Progreso del torneo: stepper horizontal (un punto por hito). */
    .progress { margin-bottom: 32px; }
    .progress h2 { margin-top: 8px; }
    .steps-scroll { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding: 2px 0; }
    .steps { display: flex; min-width: 360px; }
    .step { flex: 1 0 auto; min-width: 40px; position: relative; text-align: center; }
    /* Conector entre el punto anterior y el actual (queda detrás de los puntos). */
    .step::before { content: ""; position: absolute; top: 6px; left: -50%; width: 100%; height: 2px; background: var(--line); z-index: 0; }
    .step:first-child::before { display: none; }
    .step.done::before, .step.cur::before { background: var(--accent); }
    .dot { position: relative; z-index: 1; display: block; width: 14px; height: 14px; margin: 0 auto; border-radius: 50%; border: 2px solid var(--line); background: var(--card); box-sizing: border-box; }
    .step.done .dot { background: var(--accent); border-color: var(--accent); }
    .step.cur .dot { border-color: var(--accent); }
    .step.cur .dot::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: var(--accent); }
    .step .lbl { display: block; font-size: 11px; color: var(--muted); margin-top: 6px; white-space: nowrap; }
    .step.done .lbl, .step.cur .lbl { color: var(--ink); font-weight: 600; }
    .step .cnt { display: block; font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; min-height: 13px; margin-top: 1px; }
    .step.done .cnt { color: var(--accent); }
    .legend { margin-top: 10px; font-size: 11.5px; color: var(--muted); }
    .legend .k { display: inline-block; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--line); background: var(--card); box-sizing: border-box; vertical-align: -1px; margin: 0 4px 0 12px; }
    .legend .k:first-child { margin-left: 0; }
    .legend .k.done { background: var(--accent); border-color: var(--accent); }
    .legend .k.cur { border-color: var(--accent); }

    /* Partidos de hoy y mañana: lista compacta bajo el progreso. */
    .upcoming { margin-bottom: 32px; }
    .upcoming h2 { margin-top: 8px; }
    .up-daylabel { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; margin: 14px 0 6px; }
    .up-list { background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .up-row { display: grid; grid-template-columns: 46px 1fr 54px 1fr 64px; align-items: center; gap: 10px; padding: 9px 14px; font-size: 13.5px; }
    .up-row + .up-row { border-top: 1px solid var(--line); }
    .up-time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12.5px; }
    .up-home, .up-away { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .up-home { justify-content: flex-end; }
    .up-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .up-score { text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--num); white-space: nowrap; }
    .up-score.vs { color: var(--muted); font-weight: 400; }
    .up-state { text-align: right; white-space: nowrap; }
    .up-state .bd-live { margin-left: 0; }
    .up-final { color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; font-size: 10px; }

    /* Visualización de grupos: botón plegable + rejilla de mini-clasificaciones. */
    .groups { margin-top: 40px; }
    .groups-toggle {
      display: flex; align-items: center; gap: 10px; width: 100%;
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 14px 18px; cursor: pointer; font: inherit; color: var(--ink); text-align: left;
      transition: background 0.12s;
    }
    .groups-toggle:hover { background: #f7f3ec; }
    .gt-caret { color: var(--muted); transition: transform 0.15s; flex: none; }
    .groups-toggle.open .gt-caret { transform: rotate(90deg); color: var(--accent); }
    .gt-label { font-weight: 600; }
    /* Badge "fase finalizada" en el botón (verde discreto). */
    .gt-done { font-size: 11.5px; font-weight: 700; color: #1a7f4b; background: #e6f4ec; border: 1px solid #b9e0ca; border-radius: 999px; padding: 2px 9px; white-space: nowrap; }
    .gt-hint { color: var(--muted); font-size: 13px; margin-left: auto; white-space: nowrap; }

    /* Acordeón: misma técnica grid-template-rows 0fr -> 1fr que el resto. */
    .groups-panel { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
    .groups-panel.open { grid-template-rows: 1fr; }
    .groups-panel-inner { overflow: hidden; opacity: 0; transition: opacity 0.3s ease; }
    .groups-panel.open .groups-panel-inner { opacity: 1; }

    .g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 14px; padding-top: 14px; }
    .g-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .g-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; padding: 11px 14px 8px; }
    .g-title { font-weight: 700; font-size: 14px; }
    .g-status { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; white-space: nowrap; }
    .g-status.live { color: #d1242f; }

    .g-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .g-table th, .g-table td { padding: 6px 8px; font-size: 13px; border: none; }
    .g-table thead th { color: var(--muted); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; padding-bottom: 4px; }
    .g-table tbody tr { border-top: 1px solid var(--line); }
    .g-table .num { text-align: right; color: var(--muted); width: 30px; font-variant-numeric: tabular-nums; }
    .g-pos { width: 26px; color: var(--muted); text-align: center; font-variant-numeric: tabular-nums; }
    .g-team { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .g-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .g-team .flag { margin-right: 0; flex: none; }
    .g-pts { color: var(--num) !important; font-weight: 700; }
    /* En directo: zona de clasificación directa (1.º y 2.º) con tinte cálido + barra. */
    .g-row.q { background: #fbf4ef; }
    .g-row.q .g-pos { color: var(--accent); font-weight: 700; }
    .g-row.q td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
    /* Fase cerrada: los clasificados a dieciseisavos, con un fondo verde fino. */
    .g-row.qualified { background: #e9f6ef; }

    .g-legend { margin-top: 16px; font-size: 12px; color: var(--muted); line-height: 1.4; }
    .g-key { display: inline-block; width: 11px; height: 11px; border-radius: 3px; background: #fbf4ef; box-shadow: inset 3px 0 0 var(--accent); vertical-align: -1px; margin-right: 6px; }
    .g-key.q-done { background: #e9f6ef; box-shadow: inset 0 0 0 1px #b9e0ca; }

    /* Cuadro de eliminatorias (bracket en árbol). */
    .bracket-section { margin-top: 40px; }
    /* El título debe distinguirse del contenido y de las cabeceras de ronda
       (que comparten el estilo gris/mayúsculas): tinta, mayor y barra de acento. */
    .bracket-section h2 { color: var(--ink); font-size: 17px; border-left: 3px solid var(--accent); padding-left: 11px; margin-bottom: 22px; }
    /* El cuadro aprovecha más ancho que el resto: se sale del contenedor de
       860px y se centra respecto a la ventana, con un tope cómodo. El título de
       la sección sigue en el flujo normal (alineado con los demás). */
    .bracket-scroll {
      overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 6px;
      position: relative; left: 50%; transform: translateX(-50%);
      width: calc(100vw - 32px); max-width: 1280px; text-align: center;
    }
    .bracket-inner { display: inline-block; text-align: left; }

    /* Cabeceras de columna (≈ alineadas con cada ronda). */
    .bk-heads { display: flex; margin-bottom: 6px; }
    .bk-col-head { flex: 0 0 250px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; text-align: center; }
    .bk-col-head:first-child { flex-basis: 200px; }

    /* Árbol: cada nodo = [hijos][rama][partido]. */
    .bracket { display: flex; }
    .bk-node { display: flex; align-items: center; }
    .bk-children { display: flex; flex-direction: column; justify-content: space-around; }
    .bk-branch { flex: 0 0 50px; align-self: stretch; position: relative; }
    /* vertical uniendo los centros de los dos hijos (25%/75% con space-around) */
    .bk-branch::before { content: ""; position: absolute; left: 0; top: 25%; bottom: 25%; width: 2px; background: var(--line); }
    /* horizontal desde la vertical hacia el partido padre */
    .bk-branch::after { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: var(--line); }

    /* Celda de partido. */
    .bk-match { flex: 0 0 200px; width: 200px; background: var(--card); border: 1px solid var(--line); border-radius: 9px; margin: 5px 0; overflow: hidden; font-size: 13px; }
    .bk-team { display: flex; align-items: center; gap: 6px; padding: 5px 8px; }
    .bk-team + .bk-team { border-top: 1px solid var(--line); }
    .bk-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
    .bk-team .flag { margin-right: 0; flex: none; }
    .bk-score { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--num); flex: none; }
    .bk-team.win { background: #f0f8f3; }
    .bk-team.win .bk-name { font-weight: 700; }
    .bk-team.lose { opacity: 0.5; }
    .bk-team.tbd .bk-name { color: var(--muted); font-style: italic; }
    .bk-pen { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; flex: none; }
    .bk-match.empty { opacity: 0.65; }
    .bk-match.live { border-color: #f3b8bc; }
    .bk-state { padding: 0 8px 4px; text-align: right; }
    .bk-state .bd-live { margin-left: 0; }
    .bk-date { font-size: 10px; color: var(--muted); }

    /* Tercer puesto, aparte del árbol. */
    .bk-third { display: flex; align-items: center; gap: 12px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
    .bk-third-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; flex: none; }

    @media (max-width: 600px) {
      .wrap { padding: 24px 12px 56px; }
      h1 { font-size: 22px; }
      th, td { padding: 9px 8px; }
      .ranking .caret-col { width: 20px; }
      .ranking .pos { width: 22px; }
      .ranking tr.row > td { padding-top: 12px; padding-bottom: 12px; }
      .teams { min-width: 440px; } /* fuerza scroll horizontal en pantallas estrechas */
      .teams th, .teams td { padding: 6px 7px; font-size: 12px; }
      .teams thead th { padding-top: 9px; }
      .flag { width: 18px; height: 13px; margin-right: 6px; }

      /* El stepper se ajusta al ancho del móvil en vez de hacer scroll. */
      .steps-scroll { overflow-x: hidden; }
      .steps { min-width: 0; }
      .step { flex: 1 1 0; min-width: 0; }
      .step .lbl, .step .cnt { white-space: normal; }

      /* Partidos de hoy/mañana: columnas más estrechas para que quepa. */
      .up-row { grid-template-columns: 38px 1fr 46px 1fr 52px; gap: 7px; padding: 9px 10px; font-size: 12.5px; }
      .up-time { font-size: 11.5px; }

      /* Grupos: una columna y se oculta la pista para ganar sitio al botón. */
      .gt-hint { display: none; }
      .g-grid { grid-template-columns: 1fr; }

      /* Bracket: celdas más compactas para reducir el scroll en móvil. */
      .bk-match { flex-basis: 158px; width: 158px; font-size: 12px; }
      .bk-branch { flex-basis: 32px; }
      .bk-col-head { flex-basis: 190px; }
      .bk-col-head:first-child { flex-basis: 158px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Porra Mundial 2026</h1>
      <div class="sub">Actualizado: <span id="updated">—</span></div>
    </header>
    <main id="app"></main>
  </div>

  <!-- Orden importante: config (reglas) → data (resultados) → app (motor + render) -->
  <script src="dist/config.js"></script>
  <script src="data.js"></script>
  <script src="dist/app.js"></script>
</body>
</html>
