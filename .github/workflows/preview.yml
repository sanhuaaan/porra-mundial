name: Preview de estados (PR)

# En cada Pull Request genera preview.html (galería autocontenida con los
# distintos estados de la web) y lo sube como artefacto, además de comentar el
# enlace en la PR para que quien revisa pueda verlos antes de mergear.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node make-preview.mjs

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview.html
          if-no-files-found: error

      - name: Comentar enlace en la PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- preview-bot -->';
            const body = [
              marker,
              '### 🔎 Preview de estados de la web',
              '',
              `Descarga el artefacto **preview** de [esta ejecución](${run}#artifacts), descomprímelo y abre \`preview.html\` (doble clic). Alterna entre estados con los botones:`,
              '',
              '- **Grupos en curso** — clasificación en directo, sin cuadro.',
              '- **Grupos cerrados** — clasificados en verde y cuadro a la espera del sorteo.',
              '- **Bracket en progreso** — 16avos/octavos jugados, un cuarto en vivo.',
              '- **Campeón** — torneo completo.',
              '',
              'Datos de ejemplo (no reales). Más detalle en `PREVIEWS.md`.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
