name: Desplegar porra

# Se ejecuta al hacer push a main y por workflow_dispatch. La actualización
# periódica (cada 15 min) la dispara un cron EXTERNO (cron-job.org) llamando a
# la API de workflow_dispatch: el scheduler interno de GitHub es «best effort»
# y se saltaba/retrasaba ciclos, así que el reloj lo pone el servicio externo.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy a GitHub Pages.
# contents: write para commitear notified.json (estado de las notificaciones).
permissions:
  contents: write
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el último.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar TypeScript
        run: npm run build

      - name: Descargar resultados (football-data.org)
        run: node update.mjs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

      - name: Comprobar selecciones elegidas
        run: node test/verify-teams.mjs

      - name: Notificar fases terminadas (Google Chat)
        run: node notify.mjs
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}

      - name: Guardar estado de notificaciones
        # notify.mjs reescribe notified.json al anunciar (o al sembrar la 1.ª vez).
        # Se commitea con [skip ci] para que este push NO dispare otra corrida.
        # concurrency:pages serializa las corridas; el pull --rebase cubre un push
        # manual intercalado. notified.json no entra en _site (no afecta al sitio).
        run: |
          # --porcelain detecta también ficheros NUEVOS (untracked); `git diff`
          # solo ve los ya trackeados y se saltaría el primer notified.json.
          if [ -n "$(git status --porcelain notified.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add notified.json
            git commit -m "Notificaciones: fases anunciadas [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Preparar sitio estático
        run: |
          mkdir -p _site/dist
          cp index.html data.js _site/
          cp dist/*.js _site/dist/
          # Cache-busting: añade ?v=<run id> a cada <script src="*.js">. El id
          # cambia en CADA ejecución del workflow (también las del cron externo),
          # así que el navegador nunca sirve config.js/data.js/app.js cacheados de
          # un despliegue anterior. (index.html sí puede cachearse ~10 min: es
          # quien lleva las URLs versionadas, y de él no controlamos cabeceras en
          # Pages; en la práctica importa poco para visitas ocasionales.)
          sed -i "s#\(src=\"[^\"]*\.js\)\"#\1?v=${GITHUB_RUN_ID}\"#g" _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
